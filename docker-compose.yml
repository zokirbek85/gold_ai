services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goldai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-goldai}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldai} -d ${POSTGRES_DB:-goldai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "${WEB_HOST_PORT:-8001}:8001"
    volumes:
      - models_data:/app/ml_models
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-goldai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-goldai}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ML_MODEL_DIR: /app/ml_models
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gold.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      INTERNAL_BASE_URL: http://backend:8001
      SENTRY_DSN: ${SENTRY_DSN:-}
      SIGNAL_BUY_THRESHOLD: ${SIGNAL_BUY_THRESHOLD:-62}
      SIGNAL_SELL_THRESHOLD: ${SIGNAL_SELL_THRESHOLD:-38}
      SIGNAL_MIN_CONFIDENCE: ${SIGNAL_MIN_CONFIDENCE:-65}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8001
    restart: always
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8001
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
  models_data:
