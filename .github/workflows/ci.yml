name: Gold AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test-secret-key-for-ci"
          ENV: "test"
        run: |
          pytest tests/ -v \
            --ignore=tests/test_market_data.py \
            -x \
            --tb=short

      - name: Upload coverage
        if: always()
        run: |
          pip install pytest-cov
          pytest tests/ \
            --ignore=tests/test_market_data.py \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -q || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --ignore=E501,F401

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --ignore-scripts || npm install
      - name: Type check
        run: npm run type-check || true
      - name: Build
        run: npm run build || true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t gold-ai-backend:latest .
      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e DATABASE_URL="sqlite:///:memory:" \
            -e SECRET_KEY="test-key" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -p 8001:8000 \
            --name gold-ai-test \
            gold-ai-backend:latest
          sleep 5
          curl -f http://localhost:8001/api/v1/health || (docker logs gold-ai-test && exit 1)
          docker stop gold-ai-test
